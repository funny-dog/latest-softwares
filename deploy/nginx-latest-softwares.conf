# /etc/nginx/sites-available/latest-softwares
#
# 部署位置见 deploy/server-setup.sh 顶部的步骤说明。
# 修改后用 `sudo nginx -t && sudo systemctl reload nginx` 生效。

server {
    # 大陆区 ECS + 未备案：80/443 会被工信部规则拦截，故用 8080
    listen 8080 default_server;
    listen [::]:8080 default_server;
    server_name _;

    root /var/www/latest-softwares;
    index index.html;
    charset utf-8;

    # API 反向代理（CN 版后端，运行在 127.0.0.1:8001）
    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA 路由（虽然本项目是单页，但留着兼容未来扩展）
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 静态资源缓存策略
    location ~* \.(js|css|svg|png|ico|woff2?)$ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }
    # index.html 不缓存（保证用户总能拿到最新发布）
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # gzip 压缩（主要给 index.html 内嵌的 JSON 数据降体积）
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # 安全头
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # 隐藏 nginx 版本
    server_tokens off;

    # 日志（按需）
    access_log /var/log/nginx/latest-softwares.access.log;
    error_log  /var/log/nginx/latest-softwares.error.log warn;
}
