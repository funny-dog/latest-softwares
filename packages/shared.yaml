packages:
- id: ubuntu
  name: Ubuntu
  category: Operating Systems
  editions:
  - cn
  - intl
  homepage: https://ubuntu.com/download
  fetcher: ubuntu_releases
  args:
    platforms:
    - platform: desktop-amd64
      pattern: ubuntu-{version}-desktop-amd64.iso
    - platform: server-amd64
      pattern: ubuntu-{version}-live-server-amd64.iso
    - platform: wsl-amd64
      pattern: ubuntu-{version}-wsl-amd64.wsl
  desc_cn: Canonical 维护的流行 Linux 发行版，适合桌面和服务器
  desc_en: Popular Linux distribution maintained by Canonical for desktop and server
- id: fedora
  name: Fedora Workstation
  category: Operating Systems
  editions:
  - cn
  - intl
  homepage: https://fedoraproject.org/workstation/download/
  fetcher: fedora_releases
  args:
    edition_path: Workstation/x86_64/iso
    platforms:
    - platform: workstation-live-x86_64
      pattern: Fedora-Workstation-Live-{version}-*.x86_64.iso
  desc_cn: Red Hat 赞助的前沿 Linux 发行版，率先采用新技术
  desc_en: Cutting-edge Linux distribution sponsored by Red Hat, early adopter of
    new tech
- id: v2rayn
  name: v2rayN
  category: Network & Proxy
  editions:
  - intl
  - cn
  homepage: https://github.com/2dust/v2rayN
  fetcher: github_release
  args:
    repo: 2dust/v2rayN
    assets:
    - platform: win-x64
      pattern: v2rayN-windows-64-desktop.zip
    - platform: win-arm64
      pattern: v2rayN-windows-arm64-desktop.zip
    - platform: mac-arm64
      pattern: v2rayN-macos-arm64.dmg
    - platform: mac-x64
      pattern: v2rayN-macos-64.dmg
  desc_cn: Windows 平台的 V2Ray 图形客户端，支持多种代理协议
  desc_en: V2Ray GUI client for Windows with multi-protocol proxy support
- id: vscode
  name: Visual Studio Code
  category: Developer Tools
  editions:
  - cn
  - intl
  homepage: https://code.visualstudio.com
  fetcher: vscode_official
  args:
    builds:
    - platform: win-x64
      build: win32-x64-user
    - platform: win-arm64
      build: win32-arm64-user
    - platform: mac-arm64
      build: darwin-arm64-dmg
    - platform: mac-x64
      build: darwin-x64-dmg
  desc_cn: 微软出品的轻量级代码编辑器，支持丰富的扩展生态
  desc_en: Lightweight code editor by Microsoft with rich extension ecosystem
- id: chrome
  name: Google Chrome
  category: Browsers
  editions:
  - cn
  - intl
  homepage: https://www.google.com/chrome/
  fetcher: chrome_official
  args:
    platforms:
    - platform: win-x64
      channel: stable
      os_key: win64
      download_url: https://dl.google.com/chrome/install/standalonesetup64.exe
    - platform: mac-arm64
      channel: stable
      os_key: mac_arm64
      download_url: https://dl.google.com/chrome/mac/stable/GGRO/googlechrome.dmg
