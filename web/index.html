<!doctype html>
<html lang="zh-CN" class="h-full">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="color-scheme" content="light dark">
  <title>Latest Softwares</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E📦%3C/text%3E%3C/svg%3E">
  <script>
    window.tailwind = window.tailwind || {};
    window.tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['system-ui', 'sans-serif'],
            mono: ['ui-monospace', 'monospace'],
          },
        },
      },
    };
  </script>
  <script src="vendor/tailwindcss.js"></script>
  <link rel="stylesheet" href="styles.css">
  <script>window.__PKG_DATA__ = /*__DATA__*/ {"schema_version": 2, "packages": [], "stats": {}} /*__DATA__*/;</script>
</head>

<body
  x-data="app()"
  :class="dark ? 'dark' : ''"
  @keydown.window.slash.prevent="$refs.search.focus()"
  @keydown.window.ctrl.k.prevent="$refs.search.focus()"
  @keydown.window.meta.k.prevent="$refs.search.focus()"
  class="h-full antialiased font-sans bg-zinc-50 text-zinc-900 dark:bg-zinc-950 dark:text-zinc-100 transition-colors"
>
  <!-- Top bar -->
  <header class="border-b border-zinc-200/70 dark:border-zinc-800/70 backdrop-blur sticky top-0 z-20 bg-zinc-50/80 dark:bg-zinc-950/80">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 py-3 flex items-center justify-between gap-4">
      <div class="flex items-center gap-3 min-w-0">
        <span class="text-2xl">📦</span>
        <div class="min-w-0">
          <h1 class="text-base sm:text-lg font-semibold tracking-tight truncate" x-text="t('app_title')">Latest Softwares</h1>
          <p class="text-xs text-zinc-500 dark:text-zinc-400 truncate">
            <span x-text="statusText()"></span>
          </p>
        </div>
      </div>
      <div class="flex items-center gap-2 shrink-0">
        <a
          href="https://github.com/funny-dog/latest-softwares"
          target="_blank" rel="noopener"
          class="hidden sm:inline-flex items-center gap-1.5 text-xs text-zinc-500 hover:text-zinc-900 dark:hover:text-zinc-100 px-2 py-1 rounded-md"
          :title="t('repo_title')"
        >
          <svg class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor"><path d="M12 .3a12 12 0 0 0-3.8 23.4c.6.1.8-.3.8-.6v-2c-3.3.7-4-1.4-4-1.4-.5-1.4-1.3-1.7-1.3-1.7-1-.7.1-.7.1-.7 1.2.1 1.8 1.2 1.8 1.2 1 1.8 2.8 1.3 3.5 1 .1-.8.4-1.3.7-1.6-2.7-.3-5.5-1.3-5.5-6 0-1.2.5-2.3 1.3-3.1-.2-.4-.6-1.6 0-3.2 0 0 1-.3 3.4 1.2a11.5 11.5 0 0 1 6 0c2.3-1.5 3.3-1.2 3.3-1.2.7 1.6.2 2.8.1 3.2.7.8 1.3 1.9 1.3 3.1 0 4.6-2.8 5.6-5.5 6 .5.4.9 1 .9 2.2v3.3c0 .3.1.7.8.6A12 12 0 0 0 12 .3"></path></svg>
          GitHub
        </a>
        <button
          @click="toggleDark()"
          class="p-2 rounded-md hover:bg-zinc-200 dark:hover:bg-zinc-800 transition"
          :title="themeTitle()"
        >
          <svg x-show="!dark" class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          <svg x-show="dark" class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path stroke-linecap="round" d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
        </button>
      </div>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-4 sm:px-6 py-6 sm:py-10">
    <!-- Search -->
    <div class="relative">
      <svg class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-zinc-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path stroke-linecap="round" d="m21 21-4.3-4.3"/></svg>
      <input
        x-ref="search"
        x-model="query"
        type="search"
        :placeholder="t('search_placeholder')"
        autofocus
        class="w-full pl-12 pr-20 py-3.5 text-base rounded-xl border border-zinc-200 dark:border-zinc-800 bg-white dark:bg-zinc-900 focus:outline-none focus:ring-2 focus:ring-violet-500 focus:border-transparent placeholder:text-zinc-400 transition"
      >
      <kbd class="hidden sm:flex absolute right-4 top-1/2 -translate-y-1/2 items-center gap-1 text-xs text-zinc-400 dark:text-zinc-500 px-1.5 py-0.5 border border-zinc-200 dark:border-zinc-700 rounded font-mono">/</kbd>
    </div>

    <!-- Filters -->
    <div class="mt-5 space-y-3">
      <!-- Category -->
      <div class="flex items-center gap-2 flex-wrap">
        <span class="text-xs text-zinc-500 dark:text-zinc-400 mr-1 shrink-0" x-text="t('category')"></span>
        <template x-for="cat in categories" :key="cat">
          <button
            @click="activeCategory = cat"
            :class="activeCategory === cat
              ? 'bg-zinc-900 text-white dark:bg-zinc-100 dark:text-zinc-900'
              : 'bg-zinc-100 text-zinc-700 hover:bg-zinc-200 dark:bg-zinc-900 dark:text-zinc-300 dark:hover:bg-zinc-800'"
            class="text-xs px-3 py-1.5 rounded-full transition font-medium"
            x-text="getCategoryLabel(cat)"
          ></button>
        </template>
      </div>
      <!-- Platform -->
      <div class="flex items-center gap-2 flex-wrap">
        <span class="text-xs text-zinc-500 dark:text-zinc-400 mr-1 shrink-0" x-text="t('platform')"></span>
        <template x-for="plat in platforms" :key="plat.key">
          <button
            @click="activePlatform = plat.key"
            :class="activePlatform === plat.key
              ? 'bg-zinc-900 text-white dark:bg-zinc-100 dark:text-zinc-900'
              : 'bg-zinc-100 text-zinc-700 hover:bg-zinc-200 dark:bg-zinc-900 dark:text-zinc-300 dark:hover:bg-zinc-800'"
            class="text-xs px-3 py-1.5 rounded-full transition font-medium"
            x-text="plat.label"
          ></button>
        </template>
      </div>
    </div>

    <!-- Result count -->
    <div class="mt-6 mb-4 text-xs text-zinc-500 dark:text-zinc-400 flex items-center justify-between">
      <span x-text="resultCountText()"></span>
      <button
        x-show="query || activeCategory !== 'all' || activePlatform !== 'all'"
        @click="resetFilters()"
        class="text-violet-600 dark:text-violet-400 hover:underline"
        x-text="t('clear_filter')"
      ></button>
    </div>

    <!-- App cards -->
    <div
      x-show="filtered.length > 0"
      class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"
    >
      <template x-for="pkg in filtered" :key="pkg.id">
        <article class="group rounded-xl border border-zinc-200 dark:border-zinc-800 bg-white dark:bg-zinc-900 p-5 hover:border-zinc-300 dark:hover:border-zinc-700 hover:shadow-sm transition-all">
          <!-- Header: name + category -->
          <div class="flex items-start justify-between gap-2 mb-3">
            <a
              :href="pkg.homepage || '#'"
              target="_blank" rel="noopener"
              class="min-w-0 flex-1"
            >
              <h3 class="font-semibold text-base truncate group-hover:text-violet-600 dark:group-hover:text-violet-400 transition" x-text="pkg.name"></h3>
              <p class="text-xs text-zinc-400 dark:text-zinc-500 mt-0.5 font-mono" x-text="pkg.id"></p>
            </a>
            <span
              x-show="pkg.category"
              class="text-[10px] uppercase tracking-wide px-2 py-0.5 rounded bg-zinc-100 dark:bg-zinc-800 text-zinc-600 dark:text-zinc-400 shrink-0"
              x-text="pkg.category"
            ></span>
          </div>

          <!-- Version + date -->
          <div class="flex items-center gap-3 text-xs text-zinc-500 dark:text-zinc-400 mb-4">
            <span
              class="font-mono font-medium text-zinc-700 dark:text-zinc-300"
              :title="pkg.version_source ? (versionKindLabel(pkg.version_kind) + ' · ' + pkg.version_source) : null"
            >v<span x-text="pkg.version"></span></span>
            <span
              x-show="pkg.version_kind"
              x-text="versionKindLabel(pkg.version_kind)"
              class="rounded bg-zinc-100 px-1.5 py-0.5 text-[10px] text-zinc-500 dark:bg-zinc-800 dark:text-zinc-400"
            ></span>
            <span x-show="pkg.released_at">·</span>
            <span x-show="pkg.released_at" x-text="formatDate(pkg.released_at)"></span>
            <span
              x-show="pkg._stale || pkg.warnings?.length"
              class="text-amber-500 dark:text-amber-400"
              :title="staleTitle(pkg)"
            >⚠</span>
          </div>

          <!-- Platform badges / download buttons -->
          <div class="flex flex-wrap gap-1.5">
            <template x-for="asset in pkg.assets" :key="asset.platform">
              <a
                :href="asset.url"
                target="_blank" rel="noopener"
                :class="badgeClass(asset.platform, asset.url, asset.link_kind)"
                class="inline-flex items-center gap-1 text-xs px-2.5 py-1 rounded-md font-medium transition"
                :title="assetTitle(asset)"
              >
                <span x-text="asset.platform"></span>
                <!-- Direct download icon -->
                <svg x-show="isDirectLink(asset.url, asset.link_kind)" class="w-3 h-3 opacity-60" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" d="M12 4v12m0 0l-4-4m4 4l4-4M4 20h16"/></svg>
                <!-- External-page icon -->
                <svg x-show="!isDirectLink(asset.url, asset.link_kind)" class="w-3 h-3 opacity-60" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6M15 3h6v6M10 14 21 3"/></svg>
              </a>
            </template>
          </div>

          <!-- Metadata -->
          <div class="mt-4 pt-3 border-t border-zinc-100 dark:border-zinc-800 flex items-center justify-between text-[11px] text-zinc-400 dark:text-zinc-500">
            <span x-text="pkg.source" class="truncate"></span>
            <a
              x-show="pkg.notes_url"
              :href="pkg.notes_url"
              target="_blank" rel="noopener"
              class="hover:text-violet-500 shrink-0 ml-2"
              :title="t('release_notes')"
              x-text="t('release_notes')"
            ></a>
          </div>
        </article>
      </template>
    </div>

    <!-- Empty state -->
    <div
      x-show="filtered.length === 0"
      class="mt-16 text-center"
    >
      <div class="text-5xl mb-4">🔍</div>
      <p class="text-zinc-500 dark:text-zinc-400 mb-2" x-text="t('no_results')"></p>
      <p class="text-xs text-zinc-400 dark:text-zinc-500">
        <span x-text="t('no_results_hint')"></span>
        <button @click="resetFilters()" class="text-violet-600 dark:text-violet-400 hover:underline" x-text="t('clear_filter')"></button>
      </p>
    </div>
  </main>

  <footer class="max-w-6xl mx-auto px-4 sm:px-6 py-8 text-xs text-zinc-400 dark:text-zinc-600 text-center">
    <p x-text="t('footer')"></p>
  </footer>

  <script defer src="vendor/alpinejs.min.js"></script>
  <script src="vendor/fuse.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
