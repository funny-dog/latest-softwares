name: Sync Latest Software

on:
  schedule:
    # 每日 UTC 01:00（北京时间 09:00）
    - cron: '0 1 * * *'
  workflow_dispatch: {}
  push:
    branches: [main, master]
    paths:
      - 'packages.yaml'
      - 'scripts/**'
      - 'README.template.md'
      - 'web/**'
      - 'deploy/**'
      - '.github/workflows/sync.yml'

permissions:
  contents: write   # 自动 commit 渲染结果回主分支

concurrency:
  group: sync-latest-software
  cancel-in-progress: false

jobs:
  # ==========================================================================
  # Job 1: 数据同步 + 渲染 README + 构建 web 产物
  #   用 windows-latest 是为了让 Fido.ps1 能跑（OSVersion.Platform 硬检查）
  # ==========================================================================
  sync:
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Verify pwsh
        run: pwsh --version

      - name: Run sync
        env:
          # 走 GITHUB_TOKEN 提高 GitHub API 速率限制（5000/h vs 60/h）
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/sync.py

      - name: Validate & fix download links
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/validate_links.py

      - name: Render README
        run: python scripts/render.py

      - name: Build web (dist/)
        run: python scripts/build_web.py

      - name: Commit data + README back to repo
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: 'chore(data): sync latest software [skip ci]'
          file_pattern: 'data/latest.json README.md'
          commit_user_name: 'github-actions[bot]'
          commit_user_email: '41898282+github-actions[bot]@users.noreply.github.com'

      - name: Upload dist artifact
        # PR 不打包；调度/push/手动都打包
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v6
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ==========================================================================
  # Job 2: 部署 dist/ 到阿里云
  #   独立 job 用 ubuntu-latest（自带 rsync，windows runner 没有）
  #   由仓库变量 DEPLOY_ENABLED=true 控制是否启用 —— 没配 secrets 时跳过
  # ==========================================================================
  deploy:
    needs: sync
    if: github.event_name != 'pull_request' && vars.DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v6
        with:
          name: dist
          path: dist/

      - name: Setup SSH
        env:
          SSH_KEY:  ${{ secrets.ALIYUN_DEPLOY_KEY }}
          SSH_HOST: ${{ secrets.ALIYUN_HOST }}
          SSH_PORT: ${{ secrets.ALIYUN_PORT }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          PORT="${SSH_PORT:-22}"
          ssh-keyscan -p "$PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy to Aliyun via rsync
        env:
          SSH_HOST:    ${{ secrets.ALIYUN_HOST }}
          SSH_USER:    ${{ secrets.ALIYUN_USER }}
          SSH_PORT:    ${{ secrets.ALIYUN_PORT }}
          DEPLOY_PATH: ${{ secrets.ALIYUN_DEPLOY_PATH }}
        run: |
          PORT="${SSH_PORT:-22}"
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -p $PORT -o StrictHostKeyChecking=accept-new" \
            dist/ "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/"

      - name: Summary
        env:
          SSH_HOST: ${{ secrets.ALIYUN_HOST }}
        run: |
          echo "✅ 已部署到 http://$SSH_HOST:8080/"
          echo "  浏览器访问需要 Basic Auth 用户名/密码（在服务器 htpasswd 配置）"
