name: Sync Latest Software

on:
  schedule:
    # 每日 UTC 01:00（北京时间 09:00）
    - cron: '0 1 * * *'
  workflow_dispatch:
    inputs:
      only:
        description: '只同步指定软件 id（逗号分隔，留空=全部）。例：vscode,python'
        required: false
        default: ''
        type: string
      skip:
        description: '跳过指定软件 id（逗号分隔）。'
        required: false
        default: ''
        type: string
  push:
    branches: [main, master]
    paths:
      - 'packages.yaml'
      - 'requirements*.txt'
      - 'scripts/**'
      - 'tests/**'
      - 'README.template.md'
      - 'web/**'
      - 'deploy/**'
      - '.github/workflows/sync.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'packages.yaml'
      - 'requirements*.txt'
      - 'scripts/**'
      - 'tests/**'
      - 'README.template.md'
      - 'web/**'
      - '.github/workflows/sync.yml'

permissions:
  contents: write   # 自动 commit 渲染结果回主分支

concurrency:
  group: sync-latest-software
  cancel-in-progress: false

jobs:
  # ==========================================================================
  # Job 0: PR 轻量检查 —— 仅 PR 触发，跑在 ubuntu 上以节省启动时间
  #   不跑真实 sync / Fido / 网络密集的 validate_links —— 那些留给 main 分支
  # ==========================================================================
  pr-checks:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements*.txt

      - name: Install Python dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint + test
        uses: ./.github/actions/python-lint-test

      # 用仓库内已 commit 的 data/latest.json 验证 README 渲染一致性
      - name: Check rendered README
        run: python scripts/render.py --check

      - name: Build web (dist/)
        run: python scripts/build_web.py

  # ==========================================================================
  # Job 1: 数据同步 + 渲染 README + 构建 web 产物
  #   用 windows-latest 是为了让 Fido.ps1 能跑（OSVersion.Platform 硬检查）
  #   PR 不跑此 job —— 真实 sync 涉及 Microsoft / GitHub 等多源网络请求
  # ==========================================================================
  sync:
    if: github.event_name != 'pull_request'
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      # 拆出独立的 cache step：setup-python 内置的 cache 一旦在 restore 阶段
      # 异常终止，会把整个 step 的日志（含 Python 安装输出）一并吞掉，难以排查。
      - name: Locate pip cache dir
        id: pip-cache
        run: echo "dir=$(pip cache dir)" >> $env:GITHUB_OUTPUT

      - name: Cache pip wheels
        uses: actions/cache@v4
        with:
          path: ${{ steps.pip-cache.outputs.dir }}
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Python dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint + test
        uses: ./.github/actions/python-lint-test

      - name: Verify pwsh
        run: pwsh --version

      - name: Run sync
        # 用 env 包住 workflow_dispatch 的用户输入，避免 ${{ }} 直接拼进 run
        # 字符串导致 shell 注入。PowerShell 这边再用 splatting 安全拼参数。
        env:
          # 走 GITHUB_TOKEN 提高 GitHub API 速率限制（5000/h vs 60/h）
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SYNC_ONLY: ${{ inputs.only }}
          SYNC_SKIP: ${{ inputs.skip }}
        shell: pwsh
        run: |
          $cmdArgs = @()
          if ($env:SYNC_ONLY) { $cmdArgs += @('--only', $env:SYNC_ONLY) }
          if ($env:SYNC_SKIP) { $cmdArgs += @('--skip', $env:SYNC_SKIP) }
          python scripts/sync.py @cmdArgs

      # sync.py 重写了 latest.json，再跑一次 schema 校验拦截新引入的数据问题
      # （fetcher 静默返回空 assets / 占位符未替换 / 非法 URL 等）
      - name: Re-validate latest.json schema
        run: python -m pytest tests/test_latest_json_schema.py -q

      - name: Upload latest data artifact
        uses: actions/upload-artifact@v6
        with:
          name: latest-data
          path: data/latest.json
          retention-days: 1

      - name: Render README
        run: python scripts/render.py

      - name: Check rendered README
        run: python scripts/render.py --check

      - name: Build web (dist/)
        run: python scripts/build_web.py

      - name: Commit data + README back to repo
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: 'chore(data): sync latest software [skip ci]'
          file_pattern: 'data/latest.json README.md'
          commit_user_name: 'github-actions[bot]'
          commit_user_email: '41898282+github-actions[bot]@users.noreply.github.com'

      - name: Upload dist artifact
        uses: actions/upload-artifact@v6
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ==========================================================================
  # Job 2: 真实下载链接巡检
  #   独立 job 隔离外部网络抖动，避免主同步/部署日志被链接巡检噪声淹没。
  #   结果通过 data/link-health.json artifact 暴露；PR 不跑真实网络巡检。
  # ==========================================================================
  link-check:
    needs: sync
    if: github.event_name != 'pull_request'
    runs-on: windows-latest
    timeout-minutes: 12

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements*.txt

      - name: Install Python dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Download latest data artifact
        uses: actions/download-artifact@v6
        with:
          name: latest-data
          path: data/

      - name: Validate links and write health report
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/validate_links.py

      - name: Write link health summary
        if: ${{ always() }}
        run: python scripts/link_health_summary.py data/link-health.json

      - name: Upload link health artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v6
        with:
          name: link-health
          path: data/link-health.json
          if-no-files-found: warn
          retention-days: 14

  # ==========================================================================
  # Job 3: 部署 dist/ 到阿里云
  #   独立 job 用 ubuntu-latest（自带 rsync，windows runner 没有）
  #   由仓库变量 DEPLOY_ENABLED=true 控制是否启用 —— 没配 secrets 时跳过
  # ==========================================================================
  deploy:
    needs: sync
    if: github.event_name != 'pull_request' && vars.DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v6
        with:
          name: dist
          path: dist/

      - name: Validate deploy secrets
        env:
          ALIYUN_DEPLOY_KEY:  ${{ secrets.ALIYUN_DEPLOY_KEY }}
          ALIYUN_HOST:        ${{ secrets.ALIYUN_HOST }}
          ALIYUN_USER:        ${{ secrets.ALIYUN_USER }}
          ALIYUN_DEPLOY_PATH: ${{ secrets.ALIYUN_DEPLOY_PATH }}
        run: |
          missing=()
          [ -n "${ALIYUN_DEPLOY_KEY:-}" ] || missing+=("ALIYUN_DEPLOY_KEY")
          [ -n "${ALIYUN_HOST:-}" ] || missing+=("ALIYUN_HOST")
          [ -n "${ALIYUN_USER:-}" ] || missing+=("ALIYUN_USER")
          [ -n "${ALIYUN_DEPLOY_PATH:-}" ] || missing+=("ALIYUN_DEPLOY_PATH")
          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing required deploy secrets: %s\n' "${missing[*]}" >&2
            exit 1
          fi

      - name: Setup SSH
        env:
          SSH_KEY:  ${{ secrets.ALIYUN_DEPLOY_KEY }}
          SSH_HOST: ${{ secrets.ALIYUN_HOST }}
          SSH_PORT: ${{ secrets.ALIYUN_PORT }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          PORT="${SSH_PORT:-22}"
          ssh-keyscan -p "$PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy to Aliyun via rsync
        env:
          SSH_HOST:    ${{ secrets.ALIYUN_HOST }}
          SSH_USER:    ${{ secrets.ALIYUN_USER }}
          SSH_PORT:    ${{ secrets.ALIYUN_PORT }}
          DEPLOY_PATH: ${{ secrets.ALIYUN_DEPLOY_PATH }}
        run: |
          PORT="${SSH_PORT:-22}"
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -p $PORT -o StrictHostKeyChecking=accept-new" \
            dist/ "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/"

      - name: Summary
        env:
          SSH_HOST: ${{ secrets.ALIYUN_HOST }}
        run: |
          echo "✅ 已部署到 http://$SSH_HOST:8080/"
          echo "  浏览器访问需要 Basic Auth 用户名/密码（在服务器 htpasswd 配置）"
