name: Sync Latest Software

on:
  schedule:
    # 每日 UTC 01:00（北京时间 09:00）
    - cron: '0 1 * * *'
  workflow_dispatch:
    inputs:
      only:
        description: '只同步指定软件 id（逗号分隔，留空=全部）。例：vscode,python'
        required: false
        default: ''
        type: string
      skip:
        description: '跳过指定软件 id（逗号分隔）。'
        required: false
        default: ''
        type: string
  push:
    branches: [main, master]
    paths:
      - 'packages/**'
      - 'requirements*.txt'
      - 'scripts/**'
      - 'tests/**'
      - 'README.template.md'
      - 'README_zh.template.md'
      - 'web/**'
      - '.github/workflows/sync.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'packages/**'
      - 'requirements*.txt'
      - 'scripts/**'
      - 'tests/**'
      - 'README.template.md'
      - 'README_zh.template.md'
      - 'web/**'
      - '.github/workflows/sync.yml'

permissions:
  contents: write   # 自动 commit 渲染结果回主分支

concurrency:
  group: sync-latest-software
  cancel-in-progress: false

jobs:
  # ==========================================================================
  # Job 0: PR 轻量检查 —— 仅 PR 触发
  # ==========================================================================
  pr-checks:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements*.txt

      - name: Install Python dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint + test
        uses: ./.github/actions/python-lint-test

      - name: Check rendered README
        run: python scripts/render.py --check

      - name: Build web (dist/)
        run: python scripts/build_web.py

  # ==========================================================================
  # Job 1: 计算分片矩阵
  #   读 packages/ 目录，输出 JSON 数组供 sync-shard 的 matrix 使用。
  # ==========================================================================
  generate-shards:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      shards: ${{ steps.partition.outputs.shards }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install pyyaml
        run: pip install pyyaml

      - name: Compute partition
        id: partition
        run: |
          SHARDS=$(python scripts/partition_ids.py 3)
          echo "shards=$SHARDS" >> "$GITHUB_OUTPUT"
          echo "分片矩阵: $SHARDS"

  # ==========================================================================
  # Job 2: 并行 sync —— 每个分片独立运行 sync.py --only
  #   ubuntu-latest 预装 pwsh，windows11 fetcher 可跨平台运行。
  # ==========================================================================
  sync:
    needs: generate-shards
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        shard: ${{ fromJson(needs.generate-shards.outputs.shards) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements*.txt

      - name: Install Python dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Sync shard
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SYNC_ONLY: ${{ inputs.only }}
          SYNC_SKIP: ${{ inputs.skip }}
          SHARD_IDS: ${{ matrix.shard }}
        run: |
          ARGS=()
          if [ -n "$SHARD_IDS" ]; then ARGS+=(--only "$SHARD_IDS"); fi
          if [ -n "$SYNC_ONLY" ]; then ARGS+=(--only "$SYNC_ONLY"); fi
          if [ -n "$SYNC_SKIP" ]; then ARGS+=(--skip "$SYNC_SKIP"); fi
          python scripts/sync.py "${ARGS[@]}"

      - name: Check sync failure rate
        if: ${{ !cancelled() }}
        shell: bash
        run: python scripts/check_sync_health.py --max-fail-rate 0.10

      - name: Upload partial result
        uses: actions/upload-artifact@v6
        with:
          name: shard-${{ strategy.job-index }}
          path: data/latest.json
          retention-days: 1

  # ==========================================================================
  # Job 3: 合并分片 + 渲染 README + 构建 web + 回写仓库
  # ==========================================================================
  sync-merge:
    needs: sync
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements*.txt

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Download shard artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: shard-*
          path: /tmp/shards

      - name: Merge shard results
        run: python scripts/merge_results.py --shards-dir /tmp/shards

      - name: Re-validate latest.json schema
        run: python -m pytest tests/test_latest_json_schema.py -q

      - name: Upload latest data artifact
        uses: actions/upload-artifact@v6
        with:
          name: latest-data
          path: data/latest.json
          retention-days: 1

      - name: Render README
        run: python scripts/render.py

      - name: Check rendered README
        run: python scripts/render.py --check

      - name: Build web (dist/) — 国内版
        env:
          CN_PUBLIC_SITE_URL: ${{ vars.CN_PUBLIC_SITE_URL || 'http://localhost:8080' }}
        run: python scripts/build_web.py --edition cn

      - name: Commit data + README back to repo
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: 'chore(data): sync latest software [skip ci]'
          file_pattern: 'data/latest.json README.md'
          commit_user_name: 'github-actions[bot]'
          commit_user_email: '41898282+github-actions[bot]@users.noreply.github.com'

      - name: Upload dist artifact
        uses: actions/upload-artifact@v6
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ==========================================================================
  # Job 4: 真实下载链接巡检
  # ==========================================================================
  link-check:
    needs: sync-merge
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements*.txt

      - name: Install Python dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Download latest data artifact
        uses: actions/download-artifact@v8
        with:
          name: latest-data
          path: data/

      - name: Validate links and write health report
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/validate_links.py

      - name: Write link health summary
        if: ${{ always() }}
        run: python scripts/link_health_summary.py data/link-health.json

      - name: Upload link health artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v6
        with:
          name: link-health
          path: data/link-health.json
          if-no-files-found: warn
          retention-days: 14

  # ==========================================================================
  # Job 5: 部署 dist/ 到阿里云
  # ==========================================================================
  deploy:
    needs: sync-merge
    if: github.event_name != 'pull_request' && vars.DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Validate deploy secrets
        env:
          ALIYUN_DEPLOY_KEY:  ${{ secrets.ALIYUN_DEPLOY_KEY }}
          ALIYUN_HOST:        ${{ secrets.ALIYUN_HOST }}
          ALIYUN_USER:        ${{ secrets.ALIYUN_USER }}
          ALIYUN_DEPLOY_PATH: ${{ secrets.ALIYUN_DEPLOY_PATH }}
        run: |
          missing=()
          [ -n "${ALIYUN_DEPLOY_KEY:-}" ] || missing+=("ALIYUN_DEPLOY_KEY")
          [ -n "${ALIYUN_HOST:-}" ] || missing+=("ALIYUN_HOST")
          [ -n "${ALIYUN_USER:-}" ] || missing+=("ALIYUN_USER")
          [ -n "${ALIYUN_DEPLOY_PATH:-}" ] || missing+=("ALIYUN_DEPLOY_PATH")
          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing required deploy secrets: %s\n' "${missing[*]}" >&2
            exit 1
          fi

      - name: Setup SSH
        env:
          SSH_KEY:  ${{ secrets.ALIYUN_DEPLOY_KEY }}
          SSH_HOST: ${{ secrets.ALIYUN_HOST }}
          SSH_PORT: ${{ secrets.ALIYUN_PORT }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          PORT="${SSH_PORT:-22}"
          ssh-keyscan -p "$PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy to Aliyun via rsync
        env:
          SSH_HOST:    ${{ secrets.ALIYUN_HOST }}
          SSH_USER:    ${{ secrets.ALIYUN_USER }}
          SSH_PORT:    ${{ secrets.ALIYUN_PORT }}
          DEPLOY_PATH: ${{ secrets.ALIYUN_DEPLOY_PATH }}
        run: |
          PORT="${SSH_PORT:-22}"
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -p $PORT -o StrictHostKeyChecking=accept-new" \
            dist/ "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/"

      - name: Checkout (for backend deploy)
        uses: actions/checkout@v6

      - name: Deploy API backend to Aliyun
        env:
          SSH_HOST:    ${{ secrets.ALIYUN_HOST }}
          SSH_USER:    ${{ secrets.ALIYUN_USER }}
          SSH_PORT:    ${{ secrets.ALIYUN_PORT }}
        run: |
          PORT="${SSH_PORT:-22}"
          SSH_CMD="ssh -i ~/.ssh/deploy_key -p $PORT -o StrictHostKeyChecking=accept-new"
          # 同步后端代码和包数据
          rsync -avz --delete \
            -e "$SSH_CMD" \
            --exclude '__pycache__' --exclude '.venv' --exclude 'tests' \
            --exclude 'web/' --exclude 'dist/' --exclude '.github/' \
            --exclude 'scripts/' --exclude '.fastapicloud/' \
            ./ "$SSH_USER@$SSH_HOST:/opt/latest-softwares/"
          # 同步包数据到后端目录
          rsync -avz \
            -e "$SSH_CMD" \
            data/latest.json "$SSH_USER@$SSH_HOST:/opt/latest-softwares/data/"
          # 重启 API 服务
          $SSH_CMD "$SSH_USER@$SSH_HOST" "sudo systemctl restart latest-softwares-api" || true

      - name: Summary
        env:
          SSH_HOST: ${{ secrets.ALIYUN_HOST }}
        run: |
          echo "✅ 国内版已部署到 http://$SSH_HOST:8080/"

  # ==========================================================================
  # Job 6: 部署国际版到 FastAPI Cloud
  # ==========================================================================
  deploy-intl:
    needs: sync-merge
    if: github.event_name != 'pull_request' && vars.DEPLOY_INTL_ENABLED == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements*.txt

      - name: Install Python dependencies
        run: pip install -r requirements.txt "fastapi[standard]"

      - name: Download latest data artifact
        uses: actions/download-artifact@v8
        with:
          name: latest-data
          path: data/

      - name: Build web (dist/) — 国际版
        run: python scripts/build_web.py --edition intl

      - name: Deploy to FastAPI Cloud
        env:
          FASTAPI_CLOUD_TOKEN: ${{ secrets.FASTAPI_CLOUD_TOKEN }}
          FASTAPI_CLOUD_APP_ID: ${{ secrets.FASTAPI_CLOUD_APP_ID }}
        run: fastapi deploy

      - name: Summary
        run: |
          echo "✅ 国际版已部署到 FastAPI Cloud"
